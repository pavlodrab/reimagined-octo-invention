version: '3.8'

services:
  chelsea-bot:
    build: .
    container_name: chelsea-voting-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - MINI_APP_URL=${MINI_APP_URL}
      - SSTATS_TOKEN=${SSTATS_TOKEN}
      - OWNER_ID=${OWNER_ID:-0}
      - PORT=5000
    volumes:
      - ./data:/app/data    # persistent SQLite DB
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: nginx reverse proxy with HTTPS
  nginx:
    image: nginx:alpine
    container_name: chelsea-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - chelsea-bot

  # Optional: auto SSL with Let's Encrypt
  certbot:
    image: certbot/certbot
    container_name: chelsea-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
