version: '3.8'

services:
  app:
    build: .
    container_name: chelsea-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - MINI_APP_URL=https://drakelovc.indevs.in
      - SSTATS_TOKEN=${SSTATS_TOKEN}
      - OWNER_ID=${OWNER_ID}
      - PORT=5000
    volumes:
      - ./data:/app/data
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: chelsea-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: chelsea-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait \$\${!}; done;'"
