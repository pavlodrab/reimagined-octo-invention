# nginx.conf — прокси к Flask + HTTPS
# Скопируй на сервер и подставь свой домен

server {
    listen 80;
    server_name chestalbot.com www.chestalbot.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name chestalbot.com www.chestalbot.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/chestalbot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chestalbot.com/privkey.pem;

    # Proxy to Flask
    location / {
        proxy_pass http://chelsea-bot:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
