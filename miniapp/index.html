<!DOCTYPE html>
<html lang="ru" data-theme="dark" data-font="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Челси Голосование</title>
    <!--
      Font presets controlled by [data-font="..."] on <html>.
      All four families are preconnected + lazy-loaded via display=swap so
      we don't block paint. Cyrillic subset is included for every family
      (Russo One/Oswald are display-only — for the few Cyrillic headlines
      they don't cover, the system stack inherits via the fallback chain).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Roboto:wght@400;500;700;900&family=Oswald:wght@400;500;600;700&family=Russo+One&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ Header ═══ -->
<header id="header">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/cc/Chelsea_FC.svg/1200px-Chelsea_FC.svg.png" alt="Chelsea" id="logo" onerror="this.style.display='none'">
    <h1 id="bot-name">Челси Голосование</h1>
</header>

<!-- ═══ Tab Navigation ═══ -->
<nav id="tabs">
    <button class="tab-btn active" data-tab="vote">
        <span class="tab-icon">⚽</span>
        <span class="tab-label">Голосовать</span>
    </button>
    <button class="tab-btn" data-tab="other">
        <span class="tab-icon">📋</span>
        <span class="tab-label">Прочие</span>
    </button>
    <button class="tab-btn" data-tab="profile">
        <span class="tab-icon">👤</span>
        <span class="tab-label">Профиль</span>
    </button>
    <button class="tab-btn" data-tab="stats">
        <span class="tab-icon">📈</span>
        <span class="tab-label">Stats</span>
    </button>
    <button class="tab-btn" data-tab="settings">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">Настройки</span>
    </button>
    <button class="tab-btn admin-only" data-tab="admin" id="admin-tab-btn" style="display:none">
        <span class="tab-icon">🛡️</span>
        <span class="tab-label">Админ</span>
    </button>
</nav>

<!-- ═══ Main Content ═══ -->
<main id="content">

    <!-- ── Tab 1: Vote ── -->
    <section id="vote-tab" class="tab-content active">
        <div id="vote-loading" class="loading">
            <div class="skeleton-card">
                <div class="skeleton skeleton-avatar"></div>
                <div class="skeleton-lines">
                    <div class="skeleton skeleton-line long"></div>
                    <div class="skeleton skeleton-line short"></div>
                    <div class="skeleton-chips">
                        <span class="skeleton skeleton-chip"></span>
                        <span class="skeleton skeleton-chip"></span>
                        <span class="skeleton skeleton-chip"></span>
                        <span class="skeleton skeleton-chip"></span>
                    </div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton skeleton-avatar"></div>
                <div class="skeleton-lines">
                    <div class="skeleton skeleton-line long"></div>
                    <div class="skeleton skeleton-line short"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton skeleton-avatar"></div>
                <div class="skeleton-lines">
                    <div class="skeleton skeleton-line long"></div>
                    <div class="skeleton skeleton-line short"></div>
                </div>
            </div>
        </div>
        <div id="vote-content" style="display:none">
            <div id="match-header"></div>
            <div id="progress-bar"><div id="progress-fill"></div><span id="progress-text"></span></div>
            <div id="players-list"></div>
            <div id="vote-error" class="msg error" style="display:none"></div>
            <button id="submit-btn" class="btn-primary" disabled>Отправить голос</button>
            <div id="vote-success" class="msg success" style="display:none">✅ Голос принят!</div>
        </div>
    </section>

    <!-- ── Tab 2: Other polls ── -->
    <section id="other-tab" class="tab-content">
        <h2>Прочие голосования</h2>
        <div id="other-loading" class="loading">
            <div class="skeleton-card">
                <div class="skeleton-lines">
                    <div class="skeleton skeleton-line long"></div>
                    <div class="skeleton skeleton-line short"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-lines">
                    <div class="skeleton skeleton-line long"></div>
                    <div class="skeleton skeleton-line short"></div>
                </div>
            </div>
        </div>
        <div id="other-content" style="display:none"></div>
    </section>

    <!-- ── Tab 3: Profile ── -->
    <section id="profile-tab" class="tab-content">
        <h2>Мой профиль</h2>
        <div id="profile-loading" class="loading">
            <div class="skeleton-card">
                <div class="skeleton skeleton-avatar" style="width:80px;height:80px;"></div>
                <div class="skeleton-lines">
                    <div class="skeleton skeleton-line long"></div>
                    <div class="skeleton skeleton-line short"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-lines">
                    <div class="skeleton skeleton-line long"></div>
                    <div class="skeleton skeleton-line long"></div>
                </div>
            </div>
        </div>
        <div id="profile-content" style="display:none"></div>
    </section>

    <!-- ── Tab 4: Settings ── -->
    <section id="settings-tab" class="tab-content">
        <h2>Настройки</h2>
        <div id="settings-content"></div>
    </section>

    <!-- ── Tab: Stats ── -->
    <section id="stats-tab" class="tab-content">
        <h2>Stats</h2>
        <div id="stats-loading" class="loading">Loading...</div>
        <div id="stats-content" style="display:none"></div>
    </section>

    <!-- ── Tab 5: Admin ── -->
    <section id="admin-tab" class="tab-content">
        <h2>🛡️ Админ-панель</h2>
        <div id="admin-content"></div>
    </section>

</main>

<!-- ═══ Toast notification ═══ -->
<div id="toast" style="display:none"></div>

<!-- ═══ Share-to-Story variant picker modal ═══ -->
<div id="share-modal" class="share-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="share-modal-title" onclick="if(event.target===this) closeShareModal()">
    <div class="share-modal-card" role="document">
        <div class="share-modal-header">
            <h3 id="share-modal-title">Поделиться</h3>
            <button class="share-modal-close" onclick="closeShareModal()" aria-label="Close">&times;</button>
        </div>
        <div class="share-modal-variants" id="share-modal-variants">
            <!-- 3 variant tiles injected by JS to keep i18n strings in one place -->
        </div>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js"></script>
<script src="script.js"></script>
</body>
</html>
